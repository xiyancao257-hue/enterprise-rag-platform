services:
  api:
    environment:
      ENTERPRISE_RAG_CONFIG: ${ENTERPRISE_RAG_CONFIG:-config/production.example.json}
      ENTERPRISE_RAG_API_KEYS: ${ENTERPRISE_RAG_API_KEYS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    command: ["enterprise-rag-api"]
    depends_on:
      - qdrant
      - redis
    volumes:
      - enterprise_rag_data:/app/data

  worker:
    environment:
      ENTERPRISE_RAG_CONFIG: ${ENTERPRISE_RAG_CONFIG:-config/production.example.json}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    command:
      [
        "enterprise-rag",
        "worker",
        "--jobs",
        "data/jobs/ingest_jobs.json",
        "--index",
        "data/processed/chunks.json",
        "--config",
        "config/production.example.json",
      ]
    depends_on:
      - qdrant
      - redis
    volumes:
      - enterprise_rag_data:/app/data

  enterprise-rag:
    environment:
      ENTERPRISE_RAG_CONFIG: ${ENTERPRISE_RAG_CONFIG:-config/production.example.json}
      ENTERPRISE_RAG_API_KEYS: ${ENTERPRISE_RAG_API_KEYS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
    depends_on:
      - qdrant
      - redis
    volumes:
      - enterprise_rag_data:/app/data

  prometheus:
    image: prom/prometheus:latest
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--config.expand-env",
        "--storage.tsdb.path=/prometheus",
      ]
    environment:
      ENTERPRISE_RAG_API_KEY: ${ENTERPRISE_RAG_API_KEY:-}
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  enterprise_rag_data:
  prometheus_data:
  grafana_data:
