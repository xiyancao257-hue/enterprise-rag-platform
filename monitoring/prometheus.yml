global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: enterprise-rag-api
    metrics_path: /metrics
    scheme: http
    authorization:
      type: Bearer
      credentials: ${ENTERPRISE_RAG_API_KEY}
    static_configs:
      - targets:
          - api:8000
